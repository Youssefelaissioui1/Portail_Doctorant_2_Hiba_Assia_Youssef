<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head th:replace="~{shared/layout :: head('Connexion')}"></head>
<body class="auth-page">
<div class="auth-page__accent" aria-hidden="true"></div>
<div class="auth-page__decor" aria-hidden="true"></div>
<div class="auth-page__decor auth-page__decor--2" aria-hidden="true"></div>

<div class="auth-shell">
    <div class="auth-card">
        <div class="auth-card__body">
            <div class="auth-brand" aria-hidden="true">
                <i class="bi bi-mortarboard-fill"></i>
            </div>
            <h1 class="auth-title">Portail Doctorat</h1>
            <p class="auth-subtitle">Connectez-vous pour accéder à votre espace.</p>

            <div th:if="${errorMessage}" class="alert alert-danger py-2 px-3 mb-3" role="alert" th:text="${errorMessage}"></div>
            <div th:if="${logoutMessage}" class="alert alert-secondary py-2 px-3 mb-3 bg-light border-0" role="alert" th:text="${logoutMessage}"></div>

            <form th:action="@{/login}" method="post" class="auth-form">
                <div class="mb-3">
                    <label class="auth-label" for="login-email">Email</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                        <input id="login-email" type="email" name="email" class="form-control"
                               autocomplete="username" placeholder="vous@univ.ma" required autofocus/>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="auth-label" for="login-password">Mot de passe</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input id="login-password" type="password" name="password" class="form-control"
                               autocomplete="current-password" placeholder="········" required/>
                    </div>
                </div>
                <button type="submit" class="auth-btn">
                    <i class="bi bi-arrow-right-circle"></i> Se connecter
                </button>
            </form>

            <p class="auth-muted-link mb-0">
                Pas encore de compte&nbsp;?
                <a th:href="@{/register}" class="auth-link">Créer un compte doctorant</a>
            </p>
        </div>
        <div class="auth-footer-note">Accès réservé aux utilisateurs habilités</div>
    </div>
</div>

<div th:replace="~{shared/layout :: scripts}"></div>
</body>
</html>
