<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="fr">
<head th:replace="~{shared/layout :: head('Détail inscription')}"></head>
<body style="padding-top:56px;">
<div th:replace="~{shared/layout :: navbar}"></div>
<div th:replace="~{shared/layout :: sidebar}"></div>
<div class="main-wrap">
<div th:replace="~{shared/layout :: flash}"></div>

<div class="d-flex justify-content-between align-items-center mb-4">
  <h4 class="fw-bold mb-0"><i class="bi bi-file-earmark-text me-2 text-primary"></i>Dossier d'inscription</h4>
  <a href="javascript:history.back()" class="btn btn-outline-secondary btn-sm">
    <i class="bi bi-arrow-left me-1"></i>Retour
  </a>
</div>
<div class="row g-3">
  <div class="col-md-5">
    <div class="card h-100">
      <div class="card-header bg-white fw-semibold"><i class="bi bi-info-circle me-2"></i>Informations</div>
      <div class="card-body">
        <table class="table table-sm table-borderless mb-0">
          <tr><td class="text-muted small">Doctorant</td>
              <td class="fw-semibold" th:text="${inscription.doctorant.nomComplet}">-</td></tr>
          <tr><td class="text-muted small">Type</td>
              <td th:text="${inscription.type.name().replace('_',' ')}">-</td></tr>
          <tr><td class="text-muted small">Année</td>
              <td th:text="${inscription.anneeUniversitaire}">-</td></tr>
          <tr><td class="text-muted small">Date dépôt</td>
              <td th:text="${#temporals.format(inscription.dateDepot,'dd/MM/yyyy')}">-</td></tr>
          <tr><td class="text-muted small">Statut</td>
              <td><span th:class="'badge badge-' + ${inscription.statut.name()}"
                        th:text="${inscription.statut.name().replace('_',' ')}"></span></td></tr>
          <tr th:if="${inscription.avisDirecteur != null}">
            <td class="text-muted small">Avis directeur</td>
            <td class="text-success" th:text="${inscription.avisDirecteur}">-</td></tr>
          <tr th:if="${inscription.commentaireAdmin != null}">
            <td class="text-muted small">Commentaire admin</td>
            <td th:text="${inscription.commentaireAdmin}">-</td></tr>
          <tr th:if="${inscription.motifRejet != null}">
            <td class="text-muted small text-danger">Motif rejet</td>
            <td class="text-danger" th:text="${inscription.motifRejet}">-</td></tr>
        </table>
      </div>
    </div>
  </div>
  <div class="col-md-7">
    <div class="card h-100">
      <div class="card-header bg-white fw-semibold"><i class="bi bi-diagram-3 me-2"></i>Circuit de validation</div>
      <div class="card-body">
        <div class="d-flex align-items-center gap-2 mb-3">
          <div th:class="'rounded-circle d-flex align-items-center justify-content-center' + 
              (${inscription.statut.name() == 'SOUMIS'} ? ' bg-warning text-dark' : 
               ${inscription.statut.name() == 'VALIDE'} ? ' bg-success text-white' : 
               ${inscription.statut.name() == 'REJETE'} ? ' bg-danger text-white' : ' bg-primary text-white')"
               style="width:36px;height:36px;font-weight:700;">1</div>
          <div>
            <div class="fw-semibold small">Soumission doctorant</div>
            <div class="text-muted" style="font-size:.78rem;" th:text="${#temporals.format(inscription.dateDepot,'dd/MM/yyyy')}">-</div>
          </div>
          <i class="bi bi-check-circle-fill text-success ms-auto" th:if="${inscription.dateDepot != null}"></i>
        </div>
        <div class="d-flex align-items-center gap-2 mb-3">
          <div th:class="'rounded-circle d-flex align-items-center justify-content-center' +
              (${inscription.dateAvisDirecteur != null} ? ' bg-success text-white' : ' bg-light text-muted')"
               style="width:36px;height:36px;font-weight:700;">2</div>
          <div>
            <div class="fw-semibold small">Avis directeur de thèse</div>
            <div class="text-muted" style="font-size:.78rem;" th:text="${inscription.avisDirecteur ?: 'En attente…'}">-</div>
          </div>
          <i class="bi bi-check-circle-fill text-success ms-auto" th:if="${inscription.dateAvisDirecteur != null}"></i>
        </div>
        <div class="d-flex align-items-center gap-2">
          <div th:class="'rounded-circle d-flex align-items-center justify-content-center' +
              (${inscription.dateValidationAdmin != null} ? ' bg-success text-white' : 
               ${inscription.motifRejet != null} ? ' bg-danger text-white' : ' bg-light text-muted')"
               style="width:36px;height:36px;font-weight:700;">3</div>
          <div>
            <div class="fw-semibold small">Validation administrative</div>
            <div class="text-muted" style="font-size:.78rem;"
                 th:text="${inscription.dateValidationAdmin != null} ? 'Validé' : (${inscription.motifRejet != null} ? 'Rejeté' : 'En attente…')">-</div>
          </div>
          <i th:if="${inscription.dateValidationAdmin != null}" class="bi bi-check-circle-fill text-success ms-auto"></i>
          <i th:if="${inscription.motifRejet != null}" class="bi bi-x-circle-fill text-danger ms-auto"></i>
        </div>
      </div>
    </div>
  </div>
</div>

</div>
<div th:replace="~{shared/layout :: scripts}"></div>
</body></html>
