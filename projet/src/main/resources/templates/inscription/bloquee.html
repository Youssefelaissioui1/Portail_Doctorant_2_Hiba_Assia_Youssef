<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="fr">
<head th:replace="~{shared/layout :: head('Inscription bloquée')}"></head>
<body style="padding-top:56px;">
<div th:replace="~{shared/layout :: navbar}"></div>
<div th:replace="~{shared/layout :: sidebar}"></div>
<div class="main-wrap">
<div th:replace="~{shared/layout :: flash}"></div>

<div class="text-center py-5">
  <i class="bi bi-lock-fill text-warning" style="font-size:4rem"></i>
  <h4 class="mt-3 fw-bold">Inscription non disponible</h4>
  <p class="text-muted" th:text="${message}">Raison</p>
  <a th:href="@{/doctorant/dashboard}" class="btn btn-primary mt-2">
    <i class="bi bi-house me-1"></i>Retour au tableau de bord
  </a>
</div>

</div>
<div th:replace="~{shared/layout :: scripts}"></div>
</body></html>
