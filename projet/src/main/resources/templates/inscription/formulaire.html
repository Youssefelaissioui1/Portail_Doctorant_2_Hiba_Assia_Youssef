<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="fr">
<head th:replace="~{shared/layout :: head('Nouvelle inscription')}"></head>
<body style="padding-top:56px;">
<div th:replace="~{shared/layout :: navbar}"></div>
<div th:replace="~{shared/layout :: sidebar}"></div>
<div class="main-wrap">
<div th:replace="~{shared/layout :: flash}"></div>

<div class="d-flex justify-content-between align-items-center mb-4">
  <h4 class="fw-bold mb-0"><i class="bi bi-file-earmark-plus me-2 text-primary"></i>
    Demande d'inscription / réinscription
  </h4>
</div>
<div class="card mb-4">
  <div class="card-header bg-info bg-opacity-10 text-info fw-semibold">
    <i class="bi bi-calendar-event me-2"></i>Campagne ouverte
  </div>
  <div class="card-body">
    <div class="row">
      <div class="col-md-6">
        <div class="text-muted small">Année universitaire</div>
        <div class="fw-bold fs-5" th:text="${campagne.anneeUniversitaire}">-</div>
      </div>
      <div class="col-md-6">
        <div class="text-muted small">Période</div>
        <div class="fw-semibold">
          <span th:text="${#temporals.format(campagne.dateOuverture,'dd/MM/yyyy')}"></span>
          → <span th:text="${#temporals.format(campagne.dateFermeture,'dd/MM/yyyy')}"></span>
        </div>
      </div>
    </div>
    <p class="text-muted small mt-2 mb-0" th:text="${campagne.description}"></p>
  </div>
</div>

<div class="card">
  <div class="card-header bg-white fw-semibold"><i class="bi bi-person me-2"></i>Vos informations</div>
  <div class="card-body">
    <div class="row g-2 mb-3">
      <div class="col-md-6">
        <div class="text-muted small">Doctorant</div>
        <div class="fw-semibold" th:text="${doctorant.nomComplet}"></div>
      </div>
      <div class="col-md-6">
        <div class="text-muted small">CNE</div>
        <div th:text="${doctorant.cne}"></div>
      </div>
    </div>
    <form th:action="@{/inscriptions}" th:object="${inscription}" method="post">
      
      <input type="hidden" name="campagneId" th:value="${campagne.id}"/>
      <div class="alert alert-info small">
        <i class="bi bi-info-circle me-2"></i>
        En soumettant ce dossier, il sera transmis à votre directeur de thèse pour avis,
        puis à l'administration pour validation finale.
      </div>
      <button type="submit" class="btn btn-primary fw-semibold">
        <i class="bi bi-send me-2"></i>Soumettre le dossier
      </button>
      <a th:href="@{/inscriptions}" class="btn btn-outline-secondary ms-2">Annuler</a>
    </form>
  </div>
</div>

</div>
<div th:replace="~{shared/layout :: scripts}"></div>
</body></html>
