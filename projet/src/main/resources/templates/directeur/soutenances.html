<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="fr">
<head th:replace="~{shared/layout :: head('Soutenances')}"></head>
<body style="padding-top:56px;">
<div th:replace="~{shared/layout :: navbar}"></div>
<div th:replace="~{shared/layout :: sidebar}"></div>
<div class="main-wrap">
<div th:replace="~{shared/layout :: flash}"></div>

<div class="d-flex justify-content-between align-items-center mb-4">
  <h4 class="fw-bold mb-0"><i class="bi bi-mortarboard me-2 text-primary"></i>Suivi des soutenances</h4>
</div>
<div class="row g-3">
  <div class="col-md-6">
    <div class="card h-100">
      <div class="card-header bg-white fw-semibold">
        <i class="bi bi-hourglass-split me-2 text-warning"></i>En cours d'examen
        <span class="badge bg-warning text-dark ms-2" th:text="${#lists.size(soutenancesSoumises)}">0</span>
      </div>
      <div class="card-body p-0">
        <ul class="list-group list-group-flush">
          <li th:each="s : ${soutenancesSoumises}" class="list-group-item">
            <div class="d-flex justify-content-between align-items-center">
              <div>
                <div class="fw-semibold small" th:text="${s.doctorant.nomComplet}">-</div>
                <small class="text-muted" th:text="${#strings.abbreviate(s.doctorant.sujetThese,50)}">-</small>
              </div>
              <a th:href="@{/directeur/soutenances/{id}(id=${s.id})}" class="btn btn-sm btn-outline-primary">
                <i class="bi bi-eye"></i>
              </a>
            </div>
          </li>
          <li th:if="${#lists.isEmpty(soutenancesSoumises)}" class="list-group-item text-center text-muted py-3">
            Aucune soutenance en cours
          </li>
        </ul>
      </div>
    </div>
  </div>
  <div class="col-md-6">
    <div class="card h-100">
      <div class="card-header bg-white fw-semibold">
        <i class="bi bi-calendar-check me-2 text-success"></i>Autorisées / planifiées
        <span class="badge bg-success ms-2" th:text="${#lists.size(soutenancesAutorisees)}">0</span>
      </div>
      <div class="card-body p-0">
        <ul class="list-group list-group-flush">
          <li th:each="s : ${soutenancesAutorisees}" class="list-group-item">
            <div class="d-flex justify-content-between align-items-center">
              <div>
                <div class="fw-semibold small" th:text="${s.doctorant.nomComplet}">-</div>
                <small class="text-muted"
                       th:text="${s.datePlanifiee != null ? #temporals.format(s.datePlanifiee,'dd/MM/yyyy') : 'Date à fixer'}">-</small>
              </div>
              <a th:href="@{/directeur/soutenances/{id}(id=${s.id})}" class="btn btn-sm btn-outline-success">
                <i class="bi bi-eye"></i>
              </a>
            </div>
          </li>
          <li th:if="${#lists.isEmpty(soutenancesAutorisees)}" class="list-group-item text-center text-muted py-3">
            Aucune soutenance autorisée
          </li>
        </ul>
      </div>
    </div>
  </div>
</div>

</div>
<div th:replace="~{shared/layout :: scripts}"></div>
</body></html>
