<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="fr">
<head th:replace="~{shared/layout :: head('Détail soutenance')}"></head>
<body style="padding-top:56px;">
<div th:replace="~{shared/layout :: navbar}"></div>
<div th:replace="~{shared/layout :: sidebar}"></div>
<div class="main-wrap">
<div th:replace="~{shared/layout :: flash}"></div>

<div class="d-flex justify-content-between align-items-center mb-4">
  <h4 class="fw-bold mb-0"><i class="bi bi-mortarboard me-2 text-primary"></i>
    Soutenance – <span th:text="${soutenance.doctorant.nomComplet}"></span>
  </h4>
  <a th:href="@{/directeur/soutenances}" class="btn btn-outline-secondary btn-sm">
    <i class="bi bi-arrow-left me-1"></i>Retour
  </a>
</div>
<div class="row g-3">
  <div class="col-md-5">
    <div class="card mb-3">
      <div class="card-header bg-white fw-semibold"><i class="bi bi-info-circle me-2"></i>Informations</div>
      <div class="card-body">
        <table class="table table-sm table-borderless mb-0">
          <tr><td class="text-muted small">Statut</td>
              <td><span th:class="'badge badge-' + ${soutenance.statut.name()}"
                        th:text="${soutenance.statut.name().replace('_',' ')}"></span></td></tr>
          <tr><td class="text-muted small">Date demande</td>
              <td th:text="${#temporals.format(soutenance.dateDemande,'dd/MM/yyyy')}">-</td></tr>
          <tr th:if="${soutenance.datePlanifiee != null}">
              <td class="text-muted small">Date prévue</td>
              <td class="text-success fw-bold"
                  th:text="${#temporals.format(soutenance.datePlanifiee,'dd/MM/yyyy')} + ' à ' + ${soutenance.heurePlanifiee}">-</td></tr>
          <tr th:if="${soutenance.lieu != null}">
              <td class="text-muted small">Lieu</td>
              <td th:text="${soutenance.lieu}">-</td></tr>
        </table>
      </div>
    </div>

    <!-- Rapport rapporteur -->
    <div sec:authorize="hasRole('DIRECTEUR_THESE')"
         th:each="m : ${soutenance.membresJury}"
         th:if="${m.qualite.name() == 'RAPPORTEUR' and !m.rapportSoumis}" class="card border-warning mb-3">
      <div class="card-header bg-warning bg-opacity-10 text-warning fw-semibold small">
        <i class="bi bi-file-earmark-text me-1"></i>Soumettre le rapport de <span th:text="${m.nomComplet}"></span>
      </div>
      <div class="card-body">
        <form th:action="@{/directeur/rapport/{id}(id=${m.id})}" method="post" class="d-flex gap-2 align-items-center">
          
          <label class="form-label mb-0">Favorable ?</label>
          <select name="favorable" class="form-select form-select-sm w-auto">
            <option value="true">Oui – favorable</option>
            <option value="false">Non – défavorable</option>
          </select>
          <button type="submit" class="btn btn-sm btn-primary">Soumettre</button>
        </form>
      </div>
    </div>
  </div>

  <div class="col-md-7">
    <!-- Membres jury -->
    <div class="card mb-3">
      <div class="card-header bg-white fw-semibold"><i class="bi bi-people me-2"></i>Membres du jury</div>
      <div class="card-body p-0">
        <table class="table table-sm align-middle mb-0">
          <thead class="table-light">
            <tr><th>Nom</th><th>Qualité</th><th>Établissement</th><th>Rapport</th></tr>
          </thead>
          <tbody>
            <tr th:each="m : ${soutenance.membresJury}">
              <td class="fw-semibold small" th:text="${m.nomComplet}">-</td>
              <td><span class="badge bg-secondary small" th:text="${m.qualite.name()}">-</span></td>
              <td class="small text-muted" th:text="${m.etablissement}">-</td>
              <td>
                <i class="bi bi-check-circle-fill text-success" th:if="${m.rapportSoumis and m.rapportFavorable}"></i>
                <i class="bi bi-x-circle-fill text-danger"     th:if="${m.rapportSoumis and !m.rapportFavorable}"></i>
                <i class="bi bi-hourglass text-muted"          th:unless="${m.rapportSoumis}"></i>
              </td>
            </tr>
            <tr th:if="${#lists.isEmpty(soutenance.membresJury)}">
              <td colspan="4" class="text-center text-muted py-3">Aucun membre ajouté</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Ajouter membre jury -->
    <div class="card">
      <div class="card-header bg-white fw-semibold"><i class="bi bi-person-plus me-2"></i>Proposer un membre du jury</div>
      <div class="card-body">
        <form th:action="@{/directeur/soutenances/{id}/jury(id=${soutenance.id})}"
              th:object="${membreJury}" method="post">
          
          <div class="row g-2">
            <div class="col-md-4">
              <input type="text" th:field="*{nom}" class="form-control form-control-sm" placeholder="Nom *" required/>
            </div>
            <div class="col-md-4">
              <input type="text" th:field="*{prenom}" class="form-control form-control-sm" placeholder="Prénom *" required/>
            </div>
            <div class="col-md-4">
              <select th:field="*{qualite}" class="form-select form-select-sm" required>
                <option value="">Qualité *</option>
                <option th:each="q : ${qualites}" th:value="${q}" th:text="${q.name()}"></option>
              </select>
            </div>
            <div class="col-md-6">
              <input type="text" th:field="*{etablissement}" class="form-control form-control-sm"
                     placeholder="Établissement *" required/>
            </div>
            <div class="col-md-6">
              <input type="text" th:field="*{grade}" class="form-control form-control-sm"
                     placeholder="Grade (Pr, HDR…)"/>
            </div>
            <div class="col-12">
              <button type="submit" class="btn btn-sm btn-primary">
                <i class="bi bi-plus-circle me-1"></i>Ajouter au jury
              </button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

</div>
<div th:replace="~{shared/layout :: scripts}"></div>
</body></html>
