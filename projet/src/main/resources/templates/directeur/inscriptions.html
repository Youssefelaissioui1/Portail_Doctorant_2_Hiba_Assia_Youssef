<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="fr">
<head th:replace="~{shared/layout :: head('Dossiers à valider')}"></head>
<body style="padding-top:56px;">
<div th:replace="~{shared/layout :: navbar}"></div>
<div th:replace="~{shared/layout :: sidebar}"></div>
<div class="main-wrap">
<div th:replace="~{shared/layout :: flash}"></div>

<div class="d-flex justify-content-between align-items-center mb-4">
  <div>
    <h4 class="fw-bold mb-0"><i class="bi bi-inbox-fill me-2 text-primary"></i>Dossiers en attente de votre avis</h4>
    <p class="text-muted small mb-0">Ces dossiers ont été soumis par vos doctorants et attendent votre validation.</p>
  </div>
  <span class="badge bg-primary fs-6" th:text="${#lists.size(inscriptions)} + ' dossier(s)'"></span>
</div>

<div th:if="${#lists.isEmpty(inscriptions)}" class="card">
  <div class="card-body text-center py-5">
    <i class="bi bi-check-circle-fill text-success" style="font-size:3rem"></i>
    <h5 class="mt-3 fw-bold">Aucun dossier en attente</h5>
    <p class="text-muted">Tous les dossiers ont été traités.</p>
  </div>
</div>

<div th:unless="${#lists.isEmpty(inscriptions)}" class="row g-3">
  <div th:each="ins : ${inscriptions}" class="col-12">
    <div class="card border-start border-4 border-primary">
      <div class="card-body">
        <div class="row align-items-center g-3">
          <div class="col-md-5">
            <div class="fw-bold" th:text="${ins.doctorant.nomComplet}">-</div>
            <small class="text-muted" th:text="${ins.doctorant.email}">-</small>
            <div class="small mt-1">
              <span class="badge bg-secondary me-1"
                    th:text="${ins.type.name() == 'PREMIERE_INSCRIPTION'} ? '1ère inscription' : 'Réinscription'"></span>
              <span th:text="'Année ' + ${ins.anneeUniversitaire}"></span>
            </div>
          </div>
          <div class="col-md-3">
            <div class="text-muted small">Sujet de thèse</div>
            <div class="small fw-semibold" th:text="${#strings.abbreviate(ins.doctorant.sujetThese,60)}">-</div>
          </div>
          <div class="col-md-2">
            <div class="text-muted small">Déposé le</div>
            <div class="small" th:text="${#temporals.format(ins.dateDepot,'dd/MM/yyyy')}">-</div>
          </div>
          <div class="col-md-2 d-flex gap-2 justify-content-end">
            <a th:href="@{/directeur/inscriptions/{id}(id=${ins.id})}" class="btn btn-primary btn-sm">
              <i class="bi bi-eye me-1"></i>Examiner
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

</div>
<div th:replace="~{shared/layout :: scripts}"></div>
</body></html>
