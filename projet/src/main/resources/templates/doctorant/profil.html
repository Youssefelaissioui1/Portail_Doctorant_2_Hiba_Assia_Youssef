<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="fr">
<head th:replace="~{shared/layout :: head('Mon profil')}"></head>
<body style="padding-top:56px;">
<div th:replace="~{shared/layout :: navbar}"></div>
<div th:replace="~{shared/layout :: sidebar}"></div>
<div class="main-wrap">
<div th:replace="~{shared/layout :: flash}"></div>

<div class="d-flex justify-content-between align-items-center mb-4">
  <h4 class="fw-bold mb-0"><i class="bi bi-person-badge me-2 text-primary"></i>Mon profil</h4>
</div>
<div class="row g-3">
  <div class="col-md-4">
    <div class="card text-center p-4 h-100">
      <div style="font-size:4rem">👤</div>
      <h5 class="fw-bold mt-2 mb-0" th:text="${doctorant.prenom} + ' ' + ${doctorant.nom}"></h5>
      <p class="text-muted small" th:text="${doctorant.email}"></p>
      <span th:class="'badge badge-' + ${doctorant.statut.name()}"
            th:text="${doctorant.statut.name().replace('_',' ')}"></span>
    </div>
  </div>
  <div class="col-md-8">
    <div class="card">
      <div class="card-header bg-white"><i class="bi bi-pencil me-2"></i>Modifier mes informations</div>
      <div class="card-body">
        <form th:action="@{/doctorant/profil}" th:object="${doctorant}" method="post">
          
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label fw-semibold">Nom</label>
              <input type="text" th:field="*{nom}" class="form-control" required/>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Prénom</label>
              <input type="text" th:field="*{prenom}" class="form-control" required/>
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold">Sujet de thèse</label>
              <textarea th:field="*{sujetThese}" class="form-control" rows="2"></textarea>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Laboratoire</label>
              <input type="text" th:field="*{laboratoire}" class="form-control"/>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Spécialité</label>
              <input type="text" th:field="*{specialite}" class="form-control"/>
            </div>
            <div class="col-12">
              <button type="submit" class="btn btn-primary">
                <i class="bi bi-save me-1"></i>Enregistrer les modifications
              </button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

</div>
<div th:replace="~{shared/layout :: scripts}"></div>
</body></html>
