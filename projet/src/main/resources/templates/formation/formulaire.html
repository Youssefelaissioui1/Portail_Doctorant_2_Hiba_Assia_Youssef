<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="fr">
<head th:replace="~{shared/layout :: head('Déclarer une formation')}"></head>
<body style="padding-top:56px;">
<div th:replace="~{shared/layout :: navbar}"></div>
<div th:replace="~{shared/layout :: sidebar}"></div>
<div class="main-wrap">
<div th:replace="~{shared/layout :: flash}"></div>

<div class="d-flex justify-content-between align-items-center mb-4">
  <h4 class="fw-bold mb-0"><i class="bi bi-mortarboard-fill me-2 text-primary"></i>Déclarer une formation</h4>
  <a th:href="@{/formations}" class="btn btn-outline-secondary btn-sm">
    <i class="bi bi-arrow-left me-1"></i>Retour
  </a>
</div>
<div class="card">
  <div class="card-body">
    <div class="alert alert-info small mb-4">
      <i class="bi bi-info-circle me-2"></i>
      Les formations seront validées par l'administration. Seules les heures validées sont comptabilisées.
      <strong>Minimum requis : 200 heures.</strong>
    </div>
    <form th:action="@{/formations}" th:object="${formation}" method="post">
      
      <div class="row g-3">
        <div class="col-12">
          <label class="form-label fw-semibold">Intitulé de la formation *</label>
          <input type="text" th:field="*{intitule}" class="form-control" required
                 placeholder="Titre complet de la formation"/>
        </div>
        <div class="col-md-4">
          <label class="form-label fw-semibold">Nombre d'heures *</label>
          <div class="input-group">
            <input type="number" th:field="*{heures}" class="form-control" min="1" required placeholder="Ex : 30"/>
            <span class="input-group-text">h</span>
          </div>
        </div>
        <div class="col-md-4">
          <label class="form-label fw-semibold">Date de formation</label>
          <input type="date" th:field="*{dateFormation}" class="form-control"/>
        </div>
        <div class="col-md-4">
          <label class="form-label fw-semibold">Organisateur</label>
          <input type="text" th:field="*{organisateur}" class="form-control"
                 placeholder="Université, laboratoire…"/>
        </div>
        <div class="col-12 d-flex gap-2 pt-2">
          <button type="submit" class="btn btn-primary fw-semibold">
            <i class="bi bi-send me-2"></i>Soumettre pour validation
          </button>
          <a th:href="@{/formations}" class="btn btn-outline-secondary">Annuler</a>
        </div>
      </div>
    </form>
  </div>
</div>

</div>
<div th:replace="~{shared/layout :: scripts}"></div>
</body></html>
