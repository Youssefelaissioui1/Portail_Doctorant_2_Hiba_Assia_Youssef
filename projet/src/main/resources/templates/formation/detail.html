<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="fr">
<head th:replace="~{shared/layout :: head('Détail formation')}"></head>
<body style="padding-top:56px;">
<div th:replace="~{shared/layout :: navbar}"></div>
<div th:replace="~{shared/layout :: sidebar}"></div>
<div class="main-wrap">
<div th:replace="~{shared/layout :: flash}"></div>

<div class="d-flex justify-content-between align-items-center mb-4">
  <h4 class="fw-bold mb-0"><i class="bi bi-mortarboard me-2 text-primary"></i>Détail formation</h4>
  <a href="javascript:history.back()" class="btn btn-outline-secondary btn-sm">
    <i class="bi bi-arrow-left me-1"></i>Retour
  </a>
</div>
<div class="card">
  <div class="card-header bg-white d-flex justify-content-between align-items-center">
    <span class="fw-semibold" th:text="${formation.intitule}"></span>
    <span th:if="${formation.validee}" class="badge badge-VALIDE">Validée</span>
    <span th:unless="${formation.validee}" class="badge badge-EN_ATTENTE">En attente de validation</span>
  </div>
  <div class="card-body">
    <div class="row g-3">
      <div class="col-md-3 text-center">
        <div class="fw-bold fs-1 text-primary" th:text="${formation.heures} + 'h'">0h</div>
        <div class="text-muted small">Heures déclarées</div>
      </div>
      <div class="col-md-9">
        <table class="table table-sm table-borderless mb-0">
          <tr>
            <td class="text-muted small">Intitulé</td>
            <td class="fw-semibold" th:text="${formation.intitule}">-</td>
          </tr>
          <tr>
            <td class="text-muted small">Organisateur</td>
            <td th:text="${formation.organisateur ?: '—'}">-</td>
          </tr>
          <tr>
            <td class="text-muted small">Date formation</td>
            <td th:text="${formation.dateFormation != null ? #temporals.format(formation.dateFormation,'dd/MM/yyyy') : '—'}">-</td>
          </tr>
          <tr th:if="${formation.dateValidation != null}">
            <td class="text-muted small">Date validation</td>
            <td class="text-success" th:text="${#temporals.format(formation.dateValidation,'dd/MM/yyyy')}">-</td>
          </tr>
          <tr>
            <td class="text-muted small">Doctorant</td>
            <td th:text="${formation.doctorant.nomComplet}">-</td>
          </tr>
        </table>
      </div>
    </div>
  </div>
</div>

</div>
<div th:replace="~{shared/layout :: scripts}"></div>
</body></html>
