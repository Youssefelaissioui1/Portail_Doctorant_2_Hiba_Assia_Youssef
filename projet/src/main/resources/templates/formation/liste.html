<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="fr">
<head th:replace="~{shared/layout :: head('Mes formations')}"></head>
<body style="padding-top:56px;">
<div th:replace="~{shared/layout :: navbar}"></div>
<div th:replace="~{shared/layout :: sidebar}"></div>
<div class="main-wrap">
<div th:replace="~{shared/layout :: flash}"></div>

<div class="d-flex justify-content-between align-items-center mb-4">
  <h4 class="fw-bold mb-0"><i class="bi bi-mortarboard me-2 text-primary"></i>Mes formations doctorales</h4>
  <a th:href="@{/formations/nouvelle}" class="btn btn-primary btn-sm">
    <i class="bi bi-plus-circle me-1"></i>Déclarer une formation
  </a>
</div>

<!-- Jauge heures -->
<div class="card mb-4" th:classappend="${seuilAtteint} ? 'border-success' : 'border-warning'">
  <div class="card-body">
    <div class="d-flex justify-content-between align-items-center mb-2">
      <span class="fw-semibold">Total heures validées</span>
      <span th:class="'badge fs-6 badge-' + (${seuilAtteint} ? 'VALIDE' : 'EN_ATTENTE')"
            th:text="${totalHeures} + ' / ' + ${seuilHeures} + 'h'">0/200h</span>
    </div>
    <div class="progress" style="height:14px;border-radius:8px;">
      <div class="progress-bar" role="progressbar"
           th:classappend="${seuilAtteint} ? 'bg-success' : 'bg-warning'"
           th:style="'width:' + (${totalHeures} >= ${seuilHeures} ? 100 : ${totalHeures} * 100 / ${seuilHeures}) + '%'">
      </div>
    </div>
    <div class="text-muted small mt-1">
      Minimum requis : <strong th:text="${seuilHeures} + 'h'"></strong>
      <span th:if="${seuilAtteint}" class="text-success ms-2"><i class="bi bi-check-circle-fill me-1"></i>Seuil atteint</span>
    </div>
  </div>
</div>

<!-- Liste formations -->
<div class="card">
  <div class="card-body p-0">
    <table class="table table-hover align-middle mb-0">
      <thead class="table-light">
        <tr><th>Intitulé</th><th>Heures</th><th>Date</th><th>Organisateur</th><th>Statut</th><th></th></tr>
      </thead>
      <tbody>
        <tr th:each="f : ${formations}">
          <td>
            <div class="fw-semibold small" th:text="${f.intitule}">-</div>
          </td>
          <td>
            <span class="badge bg-secondary" th:text="${f.heures} + 'h'">0h</span>
          </td>
          <td class="small" th:text="${f.dateFormation != null ? #temporals.format(f.dateFormation,'dd/MM/yyyy') : '—'}">-</td>
          <td class="small text-muted" th:text="${f.organisateur ?: '—'}">-</td>
          <td>
            <span th:if="${f.validee}" class="badge badge-VALIDE">Validée</span>
            <span th:unless="${f.validee}" class="badge badge-EN_ATTENTE">En attente</span>
          </td>
          <td>
            <a th:href="@{/formations/{id}(id=${f.id})}" class="btn btn-sm btn-outline-primary">
              <i class="bi bi-eye"></i>
            </a>
          </td>
        </tr>
        <tr th:if="${#lists.isEmpty(formations)}">
          <td colspan="6" class="text-center text-muted py-5">
            <i class="bi bi-mortarboard fs-2 d-block mb-2"></i>
            Aucune formation déclarée.
            <a th:href="@{/formations/nouvelle}" class="d-block mt-2">Déclarer ma première formation</a>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

</div>
<div th:replace="~{shared/layout :: scripts}"></div>
</body></html>
