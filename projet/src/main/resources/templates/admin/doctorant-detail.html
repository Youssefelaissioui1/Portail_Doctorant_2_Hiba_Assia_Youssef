<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="fr">
<head th:replace="~{shared/layout :: head('Fiche doctorant – Admin')}"></head>
<body style="padding-top:56px;">
<div th:replace="~{shared/layout :: navbar}"></div>
<div th:replace="~{shared/layout :: sidebar}"></div>
<div class="main-wrap">
<div th:replace="~{shared/layout :: flash}"></div>

<div class="d-flex justify-content-between align-items-center mb-4">
  <h4 class="fw-bold mb-0"><i class="bi bi-person-badge me-2 text-primary"></i>
    <span th:text="${doctorant.nomComplet}"></span>
  </h4>
  <div class="d-flex gap-2">
    <span th:class="'badge fs-6 badge-' + ${doctorant.statut.name()}"
          th:text="${doctorant.statut.name().replace('_',' ')}"></span>
    <a th:href="@{/admin/doctorants}" class="btn btn-outline-secondary btn-sm">
      <i class="bi bi-arrow-left me-1"></i>Retour
    </a>
  </div>
</div>
<div class="row g-3">
  <!-- Infos + actions admin -->
  <div class="col-md-4">
    <div class="card mb-3">
      <div class="card-header bg-primary text-white fw-semibold"><i class="bi bi-person me-2"></i>Profil</div>
      <div class="card-body">
        <table class="table table-sm table-borderless mb-0">
          <tr><td class="text-muted small">CNE</td><td class="font-monospace" th:text="${doctorant.cne}">-</td></tr>
          <tr><td class="text-muted small">Email</td><td th:text="${doctorant.email}">-</td></tr>
          <tr><td class="text-muted small">Spécialité</td><td th:text="${doctorant.specialite ?: '—'}">-</td></tr>
          <tr><td class="text-muted small">Labo.</td><td th:text="${doctorant.laboratoire ?: '—'}">-</td></tr>
          <tr><td class="text-muted small">Directeur</td>
              <td th:text="${doctorant.directeur != null ? doctorant.directeur.nomComplet : '—'}">-</td></tr>
          <tr><td class="text-muted small">1ère inscr.</td>
              <td th:text="${#temporals.format(doctorant.datePremiereInscription,'dd/MM/yyyy')}">-</td></tr>
          <tr><td class="text-muted small">Durée</td>
              <td>
                <span th:text="${doctorant.nombreAnnees} + ' an(s)'"></span>
                <i class="bi bi-exclamation-triangle text-danger ms-1" th:if="${doctorant.nombreAnnees >= 6}"></i>
                <i class="bi bi-exclamation-triangle text-warning ms-1" th:if="${doctorant.nombreAnnees >= 5 and doctorant.nombreAnnees < 6}"></i>
              </td></tr>
        </table>
      </div>
    </div>

    <!-- Changer statut -->
    <div class="card border-warning">
      <div class="card-header bg-warning bg-opacity-10 fw-semibold small">
        <i class="bi bi-sliders me-2"></i>Actions administratives
      </div>
      <div class="card-body">
        <form th:action="@{/admin/doctorants/{id}/statut(id=${doctorant.id})}" method="post" class="mb-3">
          
          <label class="form-label small fw-semibold">Changer le statut</label>
          <select name="statut" class="form-select form-select-sm mb-2">
            <option th:each="s : ${statuts}" th:value="${s.name()}"
                    th:text="${s.name().replace('_',' ')}"
                    th:selected="${s == doctorant.statut}"></option>
          </select>
          <button type="submit" class="btn btn-warning btn-sm w-100">Appliquer</button>
        </form>
        <form th:action="@{/admin/doctorants/{id}/supprimer(id=${doctorant.id})}" method="post">
          
          <button type="submit" class="btn btn-danger btn-sm w-100"
                  onclick="return confirm('Désactiver ce compte ?')">
            <i class="bi bi-person-x me-1"></i>Désactiver le compte
          </button>
        </form>
      </div>
    </div>
  </div>

  <div class="col-md-8">
    <!-- Sujet + prérequis -->
    <div class="card mb-3">
      <div class="card-body">
        <div class="text-muted small mb-1">Sujet de thèse</div>
        <div class="fw-semibold" th:text="${doctorant.sujetThese}">-</div>
      </div>
    </div>

    <div class="row g-2 mb-3">
      <div class="col-4 text-center">
        <div class="card p-3" th:classappend="${articlesQ1Q2 >= 2} ? 'border-success' : 'border-warning'">
          <div class="fs-2 fw-bold" th:classappend="${articlesQ1Q2 >= 2} ? 'text-success' : 'text-warning'"
               th:text="${articlesQ1Q2} + '/2'">0/2</div>
          <small class="text-muted">Articles Q1/Q2</small>
        </div>
      </div>
      <div class="col-4 text-center">
        <div class="card p-3" th:classappend="${conferences >= 2} ? 'border-success' : 'border-warning'">
          <div class="fs-2 fw-bold" th:classappend="${conferences >= 2} ? 'text-success' : 'text-warning'"
               th:text="${conferences} + '/2'">0/2</div>
          <small class="text-muted">Conférences</small>
        </div>
      </div>
      <div class="col-4 text-center">
        <div class="card p-3" th:classappend="${totalHeures >= 200} ? 'border-success' : 'border-warning'">
          <div class="fs-2 fw-bold" th:classappend="${totalHeures >= 200} ? 'text-success' : 'text-warning'"
               th:text="${totalHeures} + 'h'">0h</div>
          <small class="text-muted">Formation</small>
        </div>
      </div>
    </div>

    <!-- Publications -->
    <div class="card mb-3">
      <div class="card-header bg-white fw-semibold small d-flex justify-content-between">
        <span><i class="bi bi-journal-text me-2"></i>Publications</span>
        <span class="badge bg-secondary" th:text="${#lists.size(publications)}">0</span>
      </div>
      <div class="card-body p-0">
        <table class="table table-sm align-middle mb-0">
          <thead class="table-light">
            <tr><th>Titre</th><th>Type</th><th>Q</th><th>Statut</th></tr>
          </thead>
          <tbody>
            <tr th:each="p : ${publications}">
              <td class="small" th:text="${#strings.abbreviate(p.titre,45)}">-</td>
              <td class="small" th:text="${p.type.name().replace('_',' ')}">-</td>
              <td><span th:if="${p.quartile != null}" class="badge bg-success small" th:text="${p.quartile.name()}">-</span></td>
              <td><span th:class="'badge badge-' + ${p.statut.name()} + ' small'" th:text="${p.statut.name()}">-</span></td>
            </tr>
            <tr th:if="${#lists.isEmpty(publications)}">
              <td colspan="4" class="text-muted text-center py-2">Aucune publication</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Formations -->
    <div class="card">
      <div class="card-header bg-white fw-semibold small d-flex justify-content-between">
        <span><i class="bi bi-mortarboard me-2"></i>Formations</span>
        <span class="badge bg-secondary" th:text="${totalHeures} + 'h'">0h</span>
      </div>
      <div class="card-body p-0">
        <table class="table table-sm align-middle mb-0">
          <thead class="table-light">
            <tr><th>Intitulé</th><th>Heures</th><th>Validée</th></tr>
          </thead>
          <tbody>
            <tr th:each="f : ${formations}">
              <td class="small" th:text="${f.intitule}">-</td>
              <td class="small" th:text="${f.heures} + 'h'">-</td>
              <td>
                <i class="bi bi-check-circle-fill text-success" th:if="${f.validee}"></i>
                <i class="bi bi-hourglass text-muted"           th:unless="${f.validee}"></i>
              </td>
            </tr>
            <tr th:if="${#lists.isEmpty(formations)}">
              <td colspan="3" class="text-muted text-center py-2">Aucune formation</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

</div>
<div th:replace="~{shared/layout :: scripts}"></div>
</body></html>
