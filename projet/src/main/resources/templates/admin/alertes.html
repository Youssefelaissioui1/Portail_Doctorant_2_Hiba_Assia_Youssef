<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="fr">
<head th:replace="~{shared/layout :: head('Alertes durée doctorat')}"></head>
<body style="padding-top:56px;">
<div th:replace="~{shared/layout :: navbar}"></div>
<div th:replace="~{shared/layout :: sidebar}"></div>
<div class="main-wrap">
<div th:replace="~{shared/layout :: flash}"></div>

<div class="d-flex justify-content-between align-items-center mb-4">
  <h4 class="fw-bold mb-0"><i class="bi bi-exclamation-triangle me-2 text-danger"></i>Alertes durée doctorat</h4>
  <a th:href="@{/admin/doctorants}" class="btn btn-outline-secondary btn-sm">
    <i class="bi bi-arrow-left me-1"></i>Retour
  </a>
</div>
<div class="alert alert-danger mb-4">
  <i class="bi bi-info-circle me-2"></i>
  Ces doctorants ont atteint ou dépassé <strong>5 ans</strong> depuis leur première inscription.
  La durée maximale autorisée est de <strong>6 ans</strong> (dérogation exceptionnelle possible via le PED).
</div>
<div class="card">
  <div class="card-body p-0">
    <table class="table table-hover align-middle mb-0">
      <thead class="table-light">
        <tr><th>Doctorant</th><th>1ère inscription</th><th>Durée</th><th>Statut</th><th>Directeur</th><th></th></tr>
      </thead>
      <tbody>
        <tr th:each="d : ${doctorants}"
            th:classappend="${d.nombreAnnees >= 6} ? 'table-danger' : 'table-warning'">
          <td>
            <div class="fw-semibold" th:text="${d.nomComplet}">-</div>
            <small class="text-muted" th:text="${d.email}">-</small>
          </td>
          <td th:text="${#temporals.format(d.datePremiereInscription,'dd/MM/yyyy')}">-</td>
          <td>
            <span th:class="'badge' + (${d.nombreAnnees >= 6} ? ' bg-danger' : ' bg-warning text-dark')"
                  th:text="${d.nombreAnnees} + ' ans'">-</span>
          </td>
          <td><span th:class="'badge badge-' + ${d.statut.name()}"
                    th:text="${d.statut.name().replace('_',' ')}">-</span></td>
          <td th:text="${d.directeur != null ? d.directeur.nomComplet : '—'}">-</td>
          <td>
            <a th:href="@{/admin/doctorants/{id}(id=${d.id})}" class="btn btn-sm btn-outline-primary">
              <i class="bi bi-eye me-1"></i>Gérer
            </a>
          </td>
        </tr>
        <tr th:if="${#lists.isEmpty(doctorants)}">
          <td colspan="6" class="text-center text-muted py-5">
            <i class="bi bi-check-circle-fill text-success fs-2 d-block mb-2"></i>Aucun doctorant en alerte.
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

</div>
<div th:replace="~{shared/layout :: scripts}"></div>
</body></html>
