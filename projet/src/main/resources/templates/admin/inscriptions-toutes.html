<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="fr">
<head th:replace="~{shared/layout :: head('Toutes les inscriptions')}"></head>
<body style="padding-top:56px;">
<div th:replace="~{shared/layout :: navbar}"></div>
<div th:replace="~{shared/layout :: sidebar}"></div>
<div class="main-wrap">
<div th:replace="~{shared/layout :: flash}"></div>

<div class="d-flex justify-content-between align-items-center mb-4">
  <div>
    <h4 class="fw-bold mb-0"><i class="bi bi-files me-2 text-primary"></i>Toutes les inscriptions</h4>
    <p class="text-muted small mb-0">Historique complet de toutes les inscriptions et réinscriptions.</p>
  </div>
  <a th:href="@{/admin/inscriptions}" class="btn btn-outline-primary btn-sm">
    <i class="bi bi-inbox me-1"></i>En attente seulement
  </a>
</div>

<!-- Filtres par statut -->
<div class="card mb-3">
  <div class="card-body py-2">
    <div class="d-flex flex-wrap gap-2 align-items-center">
      <span class="text-muted small fw-semibold me-1">Filtrer par statut :</span>
      <a th:href="@{/admin/inscriptions/toutes}" class="btn btn-sm btn-outline-secondary">Tous</a>
      <a th:each="s : ${statutsFiltres}"
         th:href="@{/admin/inscriptions/par-statut/{s}(s=${s.name()})}"
         th:class="'btn btn-sm' + (${s == statutActif} ? ' btn-primary' : ' btn-outline-primary')"
         th:text="${s.name().replace('_',' ')}">-</a>
    </div>
  </div>
</div>

<!-- Barre de recherche -->
<div class="card mb-3">
  <div class="card-body py-2">
    <div class="input-group">
      <span class="input-group-text"><i class="bi bi-search"></i></span>
      <input type="text" id="table-search" class="form-control"
             placeholder="Rechercher par nom, CNE, année…"/>
    </div>
  </div>
</div>

<div class="card">
  <div class="card-body p-0">
    <table class="table table-hover align-middle mb-0" id="searchable-table">
      <thead class="table-light">
        <tr>
          <th>#</th><th>Doctorant</th><th>Type</th><th>Année</th>
          <th>Dépôt</th><th>Directeur</th><th>Statut</th><th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="ins,stat : ${inscriptions}">
          <td class="text-muted small" th:text="${stat.count}">1</td>
          <td>
            <div class="fw-semibold small" th:text="${ins.doctorant.nomComplet}">-</div>
            <small class="text-muted font-monospace" th:text="${ins.doctorant.cne}">-</small>
          </td>
          <td>
            <span th:class="${ins.type.name() == 'PREMIERE_INSCRIPTION'} ? 'badge bg-primary' : 'badge bg-secondary'"
                  th:text="${ins.type.name() == 'PREMIERE_INSCRIPTION'} ? '1ère' : 'Réinscr.'">-</span>
          </td>
          <td class="fw-semibold" th:text="${ins.anneeUniversitaire}">-</td>
          <td class="small" th:text="${#temporals.format(ins.dateDepot,'dd/MM/yyyy')}">-</td>
          <td class="small text-muted"
              th:text="${ins.doctorant.directeur != null ? ins.doctorant.directeur.nomComplet : '—'}">-</td>
          <td>
            <span th:class="'badge badge-' + ${ins.statut.name()}"
                  th:text="${ins.statut.name().replace('_',' ')}">-</span>
          </td>
          <td>
            <a th:href="@{/admin/inscriptions/{id}(id=${ins.id})}"
               class="btn btn-sm btn-outline-primary" title="Voir le dossier">
              <i class="bi bi-eye"></i>
            </a>
          </td>
        </tr>
        <tr th:if="${#lists.isEmpty(inscriptions)}">
          <td colspan="8" class="text-center text-muted py-5">
            <i class="bi bi-inbox fs-2 d-block mb-2"></i>Aucune inscription.
          </td>
        </tr>
      </tbody>
    </table>
  </div>
  <div class="card-footer bg-white text-muted small">
    Total : <strong th:text="${#lists.size(inscriptions)}">0</strong> inscription(s)
  </div>
</div>

</div>
<div th:replace="~{shared/layout :: scripts}"></div>
</body></html>
