<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="fr">
<head th:replace="~{shared/layout :: head('Campagne – Formulaire')}"></head>
<body style="padding-top:56px;">
<div th:replace="~{shared/layout :: navbar}"></div>
<div th:replace="~{shared/layout :: sidebar}"></div>
<div class="main-wrap">
<div th:replace="~{shared/layout :: flash}"></div>

<div class="d-flex justify-content-between align-items-center mb-4">
  <h4 class="fw-bold mb-0">
    <i class="bi bi-calendar-plus me-2 text-primary"></i>
    <span th:text="${campagne.id == null} ? 'Nouvelle campagne' : 'Modifier la campagne'"></span>
  </h4>
  <a th:href="@{/admin/campagnes}" class="btn btn-outline-secondary btn-sm">
    <i class="bi bi-arrow-left me-1"></i>Retour
  </a>
</div>
<div class="card" style="max-width:640px;">
  <div class="card-body">
    <form th:action="${campagne.id == null} ? @{/admin/campagnes} : @{/admin/campagnes/{id}/modifier(id=${campagne.id})}"
          th:object="${campagne}" method="post">
      
      <div class="row g-3">
        <div class="col-md-4">
          <label class="form-label fw-semibold">Année universitaire *</label>
          <input type="number" th:field="*{anneeUniversitaire}" class="form-control"
                 min="2020" max="2040" placeholder="2025" required/>
        </div>
        <div class="col-md-4">
          <label class="form-label fw-semibold">Date d'ouverture *</label>
          <input type="date" th:field="*{dateOuverture}" class="form-control" required/>
        </div>
        <div class="col-md-4">
          <label class="form-label fw-semibold">Date de fermeture *</label>
          <input type="date" th:field="*{dateFermeture}" class="form-control" required/>
        </div>
        <div class="col-12">
          <label class="form-label fw-semibold">Description</label>
          <input type="text" th:field="*{description}" class="form-control"
                 placeholder="Ex : Campagne d'inscription 2025-2026"/>
        </div>
        <div class="col-12">
          <div class="form-check">
            <input type="checkbox" th:field="*{active}" class="form-check-input" id="activeCheck"/>
            <label class="form-check-label" for="activeCheck">Activer immédiatement cette campagne</label>
          </div>
        </div>
        <div class="col-12 d-flex gap-2 pt-2">
          <button type="submit" class="btn btn-primary fw-semibold">
            <i class="bi bi-save me-2"></i>Enregistrer
          </button>
          <a th:href="@{/admin/campagnes}" class="btn btn-outline-secondary">Annuler</a>
        </div>
      </div>
    </form>
  </div>
</div>

</div>
<div th:replace="~{shared/layout :: scripts}"></div>
</body></html>
